name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: build, vet, test, examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build (library + every example)
        run: go build ./...

      - name: go test
        run: go test ./...
